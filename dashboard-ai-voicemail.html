<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Puhelinvastaaja - Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      margin: 0;
      padding: 28px;
      color: #111827;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      margin-bottom: 6px;
      font-size: 38px;
    }

    .muted {
      color: #cbd5e1;
      margin-bottom: 28px;
      font-size: 18px;
    }

    .settings {
      background: white;
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .settings h2 {
      margin-top: 0;
      font-size: 26px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .reply-box {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      background: #f8fafc;
    }

    label {
      font-weight: 800;
      display: block;
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 12px;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 95px;
      resize: vertical;
    }

    .active-row {
      margin: 12px 0 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .active-option {
      background: #eef2ff;
      border-radius: 999px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .save-status {
      margin-top: 12px;
      color: #475569;
      font-weight: 700;
    }

    .card {
      background: #dcfce7;
      border-radius: 22px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      position: relative;
    }

    .card.high-risk {
      background: #fee2e2;
    }

    .card.mid-risk {
      background: #fef3c7;
    }

    .card.low-risk {
      background: #dcfce7;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      margin: 0;
    }

    .risk {
      background: #16a34a;
      color: white;
      padding: 13px 22px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 18px;
      white-space: nowrap;
    }

    .risk.high {
      background: #dc2626;
    }

    .risk.mid {
      background: #f59e0b;
    }

    .line {
      font-size: 19px;
      margin: 18px 0;
      line-height: 1.45;
    }

    .line strong {
      font-weight: 800;
    }

    .buttons {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button, .call-link {
      border: none;
      padding: 13px 20px;
      border-radius: 999px;
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .blue { background: #2563eb; }
    .green { background: #16a34a; }
    .red { background: #dc2626; }
    .orange { background: #f59e0b; }
    .dark { background: #0f172a; }

    .empty {
      background: white;
      border-radius: 18px;
      padding: 22px;
      font-size: 18px;
    }

    @media (max-width: 700px) {
      body {
        padding: 16px;
      }

      h1 {
        font-size: 30px;
      }

      .top {
        flex-direction: column;
      }

      .card, .settings {
        padding: 22px;
      }

      .title {
        font-size: 24px;
      }

      .line {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>AI Puhelinvastaaja</h1>
    <div class="muted">Viimeisimmät puhelut, yhteenvedot ja vastaustavat</div>

    <div class="settings">
      <h2>Assistentin vastaustapa</h2>
      <p>Valitse aktiivinen vastaustapa ja muokkaa tekstiä, jonka puhelinassistentti sanoo soittajalle.</p>

      <div class="active-row">
        <label class="active-option">
          <input type="radio" name="activeReply" value="reply1">
          <span id="reply1RadioName">Vastaus 1</span>
        </label>

        <label class="active-option">
          <input type="radio" name="activeReply" value="reply2">
          <span id="reply2RadioName">Vastaus 2</span>
        </label>

        <label class="active-option">
          <input type="radio" name="activeReply" value="reply3">
          <span id="reply3RadioName">Vastaus 3</span>
        </label>
      </div>

      <div class="settings-grid">
        <div class="reply-box">
          <label>Vastaustavan nimi 1</label>
          <input id="reply1Name" placeholder="Esim. Palaveri">
          <label>Vastausviesti 1</label>
          <textarea id="reply1Message" placeholder="Mitä assistentti sanoo soittajalle?"></textarea>
        </div>

        <div class="reply-box">
          <label>Vastaustavan nimi 2</label>
          <input id="reply2Name" placeholder="Esim. Reissussa">
          <label>Vastausviesti 2</label>
          <textarea id="reply2Message" placeholder="Mitä assistentti sanoo soittajalle?"></textarea>
        </div>

        <div class="reply-box">
          <label>Vastaustavan nimi 3</label>
          <input id="reply3Name" placeholder="Esim. Yleinen">
          <label>Vastausviesti 3</label>
          <textarea id="reply3Message" placeholder="Mitä assistentti sanoo soittajalle?"></textarea>
        </div>
      </div>

      <div class="buttons">
        <button class="dark" onclick="saveSettings()">Tallenna vastaustavat</button>
      </div>

      <div id="settingsStatus" class="save-status"></div>
    </div>

    <div id="calls">Ladataan...</div>
  </div>

  <script>
    const el = document.getElementById('calls');
    const settingsStatus = document.getElementById('settingsStatus');

    const defaultSettings = {
      activeReply: 'reply1',
      replies: {
        reply1: {
          name: 'Palaveri',
          message: 'Hei, olen juuri palaverissa. Kerro lyhyesti nimesi ja asiasi, niin välitän viestin eteenpäin.'
        },
        reply2: {
          name: 'Reissussa',
          message: 'Hei, olen tällä hetkellä reissussa enkä pääse vastaamaan. Kerro lyhyesti nimesi ja asiasi, niin palaan asiaan myöhemmin.'
        },
        reply3: {
          name: 'Yleinen',
          message: 'Hei, olet yhteydessä tekoälyavustajaan. Kerro lyhyesti nimesi ja asiasi.'
        }
      }
    };

    function esc(v) {
      return String(v ?? '').replace(/[&<>'"]/g, c => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        "'":'&#39;',
        '"':'&quot;'
      }[c]));
    }

    function getRisk(d) {
      return Number(d.spamRisk ?? d.riskScore ?? d.risk ?? 0);
    }

    function riskClass(risk) {
      if (risk >= 70) return 'high-risk';
      if (risk >= 35) return 'mid-risk';
      return 'low-risk';
    }

    function riskBadgeClass(risk) {
      if (risk >= 70) return 'high';
      if (risk >= 35) return 'mid';
      return '';
    }

    function formatDate(createdAt) {
      if (createdAt?._seconds) {
        return new Date(createdAt._seconds * 1000).toLocaleString('fi-FI');
      }

      if (createdAt?.seconds) {
        return new Date(createdAt.seconds * 1000).toLocaleString('fi-FI');
      }

      if (typeof createdAt === 'string') {
        return new Date(createdAt).toLocaleString('fi-FI');
      }

      return '';
    }

    function fullPhone(d) {
      return d.from || d.phone || d.callerNumber || d.number || d.fromMasked || 'Tuntematon';
    }

    function setValue(id, value) {
      const item = document.getElementById(id);
      if (item) item.value = value || '';
    }

    function setText(id, value) {
      const item = document.getElementById(id);
      if (item) item.textContent = value || '';
    }

    function getActiveReply() {
      const selected = document.querySelector('input[name="activeReply"]:checked');
      return selected ? selected.value : 'reply1';
    }

    function updateRadioNames() {
      setText('reply1RadioName', document.getElementById('reply1Name').value || 'Vastaus 1');
      setText('reply2RadioName', document.getElementById('reply2Name').value || 'Vastaus 2');
      setText('reply3RadioName', document.getElementById('reply3Name').value || 'Vastaus 3');
    }

    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = res.ok ? await res.json() : defaultSettings;
        const settings = {
          ...defaultSettings,
          ...data,
          replies: {
            ...defaultSettings.replies,
            ...(data.replies || {})
          }
        };

        setValue('reply1Name', settings.replies.reply1.name);
        setValue('reply1Message', settings.replies.reply1.message);

        setValue('reply2Name', settings.replies.reply2.name);
        setValue('reply2Message', settings.replies.reply2.message);

        setValue('reply3Name', settings.replies.reply3.name);
        setValue('reply3Message', settings.replies.reply3.message);

        const active = settings.activeReply || 'reply1';
        const radio = document.querySelector(`input[name="activeReply"][value="${active}"]`);
        if (radio) radio.checked = true;

        updateRadioNames();
      } catch (err) {
        console.error(err);
        settingsStatus.textContent = 'Asetusten lataus ei vielä toimi. Lisää seuraavaksi server.js asetusten tallennukselle.';
        setValue('reply1Name', defaultSettings.replies.reply1.name);
        setValue('reply1Message', defaultSettings.replies.reply1.message);
        setValue('reply2Name', defaultSettings.replies.reply2.name);
        setValue('reply2Message', defaultSettings.replies.reply2.message);
        setValue('reply3Name', defaultSettings.replies.reply3.name);
        setValue('reply3Message', defaultSettings.replies.reply3.message);
        document.querySelector('input[name="activeReply"][value="reply1"]').checked = true;
        updateRadioNames();
      }
    }

    async function saveSettings() {
      updateRadioNames();

      const payload = {
        activeReply: getActiveReply(),
        replies: {
          reply1: {
            name: document.getElementById('reply1Name').value,
            message: document.getElementById('reply1Message').value
          },
          reply2: {
            name: document.getElementById('reply2Name').value,
            message: document.getElementById('reply2Message').value
          },
          reply3: {
            name: document.getElementById('reply3Name').value,
            message: document.getElementById('reply3Message').value
          }
        }
      };

      try {
        settingsStatus.textContent = 'Tallennetaan...';

        const res = await fetch('/api/settings', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('Tallennus epäonnistui');

        settingsStatus.textContent = 'Tallennettu ✅';
      } catch (err) {
        console.error(err);
        settingsStatus.textContent = 'Tallennus epäonnistui. Lisää seuraavaksi server.js asetusten tallennukselle.';
      }
    }

    async function loadCalls() {
      try {
        const res = await fetch('/api/calls');
        const calls = await res.json();

        if (!Array.isArray(calls) || calls.length === 0) {
          el.innerHTML = '<div class="empty">Ei puheluita vielä.</div>';
          return;
        }

        el.innerHTML = calls.map(d => {
          const risk = getRisk(d);
          const phone = fullPhone(d);
          const telLink = phone && phone !== 'Tuntematon'
            ? `tel:${String(phone).replace(/\s/g, '')}`
            : '#';

          return `
            <div class="card ${riskClass(risk)}">
              <div class="top">
                <h2 class="title">${esc(d.category || d.label || 'Epäselvä')}</h2>
                <div class="risk ${riskBadgeClass(risk)}">Riski ${esc(risk)}/100</div>
              </div>

              <div class="line"><strong>Status:</strong> ${esc(d.status || 'new')}</div>
              <div class="line"><strong>Aika:</strong> ${esc(formatDate(d.createdAt))}</div>
              <div class="line"><strong>Soittaja:</strong> ${esc(phone)}</div>
              <div class="line"><strong>Nimi:</strong> ${esc(d.callerName || d.name || 'Tuntematon')}</div>
              <div class="line"><strong>Kiireellisyys:</strong> ${esc(d.priority || d.urgency || 'keskitaso')}</div>
              <div class="line"><strong>Suositus:</strong> ${esc(d.recommendedAction || d.action || 'tarkista')}</div>
              <div class="line"><strong>Yhteenveto:</strong> ${esc(d.summary || d.aiSummary || 'Ei yhteenvetoa')}</div>
              <div class="line"><strong>Riskin syy:</strong> ${esc(d.riskReason || d.reason || 'Ei riskiselitettä')}</div>
              <div class="line"><strong>Puheen sisältö:</strong> ${esc(d.transcript || d.message || d.speechText || d.userSpeech || 'Ei puhesisältöä')}</div>

              <div class="buttons">
                <a class="call-link blue" href="${esc(telLink)}">Soita takaisin</a>
                <button class="green">Merkitse hoidetuksi</button>
                <button class="red">Estä jatkossa</button>
                <button class="orange">Tallenna luotetuksi</button>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error(err);
        el.innerHTML = '<div class="empty">Dashboardin lataus epäonnistui.</div>';
      }
    }

    document.addEventListener('input', updateRadioNames);

    loadSettings();
    loadCalls();
  </script>
</body>
</html>
