<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Puhelinvastaaja - Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fb; margin:0; padding:24px; color:#111827; }
    .wrap { max-width: 980px; margin:0 auto; }
    h1 { margin-bottom: 6px; }
    .muted { color:#6b7280; margin-bottom:24px; }
    .card { background:white; border-radius:16px; padding:18px; margin-bottom:14px; box-shadow:0 6px 24px rgba(0,0,0,.07); }
    .row { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .badge { display:inline-block; padding:5px 10px; border-radius:999px; background:#eef2ff; font-size:13px; }
    .high { background:#fee2e2; }
    .mid { background:#fef3c7; }
    .low { background:#dcfce7; }
    .summary { font-size:17px; margin:12px 0; }
    .small { font-size:13px; color:#6b7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AI Puhelinvastaaja</h1>
    <div class="muted">Viimeisimmät puhelut ja yhteenvedot</div>
    <div id="calls">Ladataan...</div>
  </div>

  <script>
    const el = document.getElementById('calls');

    function esc(v) {
      return String(v ?? '').replace(/[&<>'"]/g, c => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        "'":'&#39;',
        '"':'&quot;'
      }[c]));
    }

    function priorityClass(p) {
      if (p === 'korkea') return 'high';
      if (p === 'keskitaso') return 'mid';
      return 'low';
    }

    function formatDate(createdAt) {
      if (createdAt?._seconds) {
        return new Date(createdAt._seconds * 1000).toLocaleString('fi-FI');
      }

      if (createdAt?.seconds) {
        return new Date(createdAt.seconds * 1000).toLocaleString('fi-FI');
      }

      if (typeof createdAt === 'string') {
        return new Date(createdAt).toLocaleString('fi-FI');
      }

      return '';
    }

    async function loadCalls() {
      try {
        const res = await fetch('/api/calls');
        const calls = await res.json();

        if (!Array.isArray(calls) || calls.length === 0) {
          el.innerHTML = '<div class="card">Ei puheluita vielä.</div>';
          return;
        }

        el.innerHTML = calls.map(d => {
          const date = formatDate(d.createdAt);

          return `
            <div class="card">
              <div class="row">
                <div>
                  <strong>📞 ${esc(d.fromMasked || d.from || d.phone || 'Tuntematon')}</strong>
                  <div class="small">${esc(date)}</div>
                </div>
                <div>
                  <span class="badge ${priorityClass(d.priority)}">${esc(d.priority || 'matala')}</span>
                  <span class="badge">${esc(d.category || 'epäselvä')}</span>
                </div>
              </div>

              <div class="summary">🧠 ${esc(d.summary || d.aiSummary || 'Ei yhteenvetoa')}</div>

              <div><strong>Suositus:</strong> ${esc(d.recommendedAction || d.action || 'tarkista')}</div>
              <div class="small">Spam-risk: ${esc(d.spamRisk ?? d.riskScore ?? '-')} / 100</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error(err);
        el.innerHTML = '<div class="card">Dashboardin lataus epäonnistui.</div>';
      }
    }

    loadCalls();
  </script>
</body>
</html>
